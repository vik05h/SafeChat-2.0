name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          GCP_PROJECT_ID: safechat-prod
          FIREBASE_ADMIN_KEY_PATH: ${{ github.workspace }}/ci-firebase-key.json
          FIREBASE_ADMIN_SDK_KEY: ${{ secrets.FIREBASE_ADMIN_SDK_KEY }}
        run: |
          # Importing the app initialises the Firebase Admin SDK at module
          # load time, so tests need a structurally-valid SA key on disk.
          # initialize_app() makes no network call; Firestore is mocked in
          # the tests themselves.
          printf '%s' "$FIREBASE_ADMIN_SDK_KEY" > "$FIREBASE_ADMIN_KEY_PATH"
          pytest

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and push image (Cloud Build)
        run: |
          gcloud builds submit ./backend \
            --tag us-central1-docker.pkg.dev/safechat-prod/safechat/backend:${{ github.sha }} \
            --quiet

      - name: Tag image as latest
        run: |
          gcloud artifacts docker tags add \
            us-central1-docker.pkg.dev/safechat-prod/safechat/backend:${{ github.sha }} \
            us-central1-docker.pkg.dev/safechat-prod/safechat/backend:latest \
            --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy safechat-backend \
            --image us-central1-docker.pkg.dev/safechat-prod/safechat/backend:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency 80 \
            --timeout 60 \
            --set-env-vars GCP_PROJECT_ID=safechat-prod,ENVIRONMENT=production,LOG_LEVEL=INFO,FIREBASE_ADMIN_KEY_PATH=/secrets/firebase-admin-key.json \
            --set-secrets /secrets/firebase-admin-key.json=firebase-admin-key:latest,OPENAI_API_KEY=openai-api-key:latest \
            --quiet
