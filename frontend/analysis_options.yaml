include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # @JsonKey on freezed factory constructor parameters is valid usage.
    # The warning fires because .freezed.dart/.g.dart generated files are
    # absent from version control — suppress as a known false positive.
    invalid_annotation_target: ignore

linter:
  rules:
    - prefer_const_constructors
    - prefer_const_declarations
    - avoid_unnecessary_containers
    - use_key_in_widget_constructors
